# -*= Adaptive router aliases =*-
# adaptive_router_config must be inside litellm_params (not auto_router_config — that's a file path)

  - model_name: default
    litellm_params:
      model: auto_router/adaptive_router
      adaptive_router_config:
        available_models: ["deepseek-v4-pro", "qwen3-coder", "claude-sonnet-4-6"]
        weights:
          quality: 0.5
          cost: 0.5

