router_settings:
  routing_strategy: simple-shuffle
  num_retries: 3
  fallbacks:
    - tier3: ["tier2"]
    - tier2: ["tier1"]
    - tier1: ["deepseek-v4-flash", "minimax-m2.7", "claude-haiku-4-5"]
    - default: ["tier1"]
    - gsd-execute: ["minimax-m2.7", "claude-haiku-4-5"]
    - gsd-milestone: ["minimax-m2.7", "claude-haiku-4-5"]

general_settings:
  master_key: {{ .LITELLM_MASTER_KEY }}
  database_url: "postgresql://{{ .LITELLM_POSTGRES_USER }}:{{ .LITELLM_POSTGRES_PASSWORD }}@postgres17-rw.database.svc.cluster.local/litellm"

litellm_settings:
  num_retries: 3
  request_timeout: 180
  allowed_fails: 3
  cooldown_time: 30
  drop_params: true
  modify_params: true
  telemetry: false
  retry: true
  add_function_to_prompt: true
  set_verbose: false
  cache: true
  cache_params:
    type: redis
    namespace: "litellm_caching"
    host: dragonfly.database.svc.cluster.local.
    port: 6379
