model_list:
# -*= Individual models (with adaptive router quality metadata) =*-

  - model_name: deepseek-v4-flash
    litellm_params:
      model: openrouter/deepseek/deepseek-v4-flash
      api_key: {{ .LITELLM_OPENROUTER_API_KEY }}
      # Disable reasoning output. LiteLLM v1.86.1's streaming OpenAI->Anthropic
      # transform emits thinking_delta into a text-typed block for reasoning
      # models (esp. with tools), which hangs Claude Code's strict SSE parser.
      # merge_reasoning_content_in_choices does NOT cover the tool-calling path;
      # excluding reasoning entirely yields a clean stream. Re-enable once the
      # LiteLLM streaming transform is fixed in a newer release.
      reasoning:
        enabled: false
    model_info:
      adaptive_router_preferences:
        quality_tier: 1
        strengths: ["code_generation", "code_understanding", "general"]

  - model_name: kimi-latest
    litellm_params:
      model: openrouter/moonshotai/kimi-latest
      api_key: {{ .LITELLM_OPENROUTER_API_KEY }}
      reasoning:
        enabled: false
    model_info:
      adaptive_router_preferences:
        quality_tier: 1
        strengths: ["code_generation", "general", "writing"]

  - model_name: claude-haiku-4-5
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: {{ .LITELLM_ANTHROPIC_API_KEY }}
    model_info:
      adaptive_router_preferences:
        quality_tier: 2
        strengths: ["code_generation", "code_understanding", "general"]

  - model_name: claude-sonnet-4-6
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: {{ .LITELLM_ANTHROPIC_API_KEY }}
    model_info:
      adaptive_router_preferences:
        quality_tier: 3
        strengths: ["code_generation", "code_understanding", "analytical_reasoning", "technical_design"]

  - model_name: claude-opus-4-7
    litellm_params:
      model: anthropic/claude-opus-4-7
      api_key: {{ .LITELLM_ANTHROPIC_API_KEY }}
    model_info:
      adaptive_router_preferences:
        quality_tier: 3
        strengths: ["code_generation", "analytical_reasoning", "technical_design", "writing"]

  - model_name: gpt-5.5
    litellm_params:
      model: openrouter/openai/gpt-5.5-20260423
      api_key: {{ .LITELLM_OPENROUTER_API_KEY }}
    model_info:
      adaptive_router_preferences:
        quality_tier: 3
        strengths: ["code_generation", "analytical_reasoning", "technical_design"]

# -*= Adaptive router aliases =*-
# adaptive_router_config must be inside litellm_params (not auto_router_config — that's a file path)

  - model_name: default
    litellm_params:
      model: auto_router/adaptive_router
      adaptive_router_config:
        available_models: ["deepseek-v4-flash", "kimi-latest", "claude-haiku-4-5", "claude-sonnet-4-6"]
        weights:
          quality: 0.25
          cost: 0.75

  - model_name: tier1
    litellm_params:
      model: auto_router/adaptive_router
      adaptive_router_config:
        available_models: ["deepseek-v4-flash", "kimi-latest"]
        weights:
          quality: 0.2
          cost: 0.8

  - model_name: tier2
    litellm_params:
      model: auto_router/adaptive_router
      adaptive_router_config:
        available_models: ["deepseek-v4-flash", "claude-haiku-4-5", "claude-sonnet-4-6"]
        weights:
          quality: 0.5
          cost: 0.5

  - model_name: tier3
    litellm_params:
      model: auto_router/adaptive_router
      adaptive_router_config:
        available_models: ["claude-sonnet-4-6", "claude-opus-4-7", "gpt-5.5"]
        weights:
          quality: 0.8
          cost: 0.2

# -*= Direct shorthand aliases =*-

  - model_name: sonnet
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: {{ .LITELLM_ANTHROPIC_API_KEY }}

  - model_name: haiku
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: {{ .LITELLM_ANTHROPIC_API_KEY }}

  - model_name: opus
    litellm_params:
      model: anthropic/claude-opus-4-7
      api_key: {{ .LITELLM_ANTHROPIC_API_KEY }}

  - model_name: heavy
    litellm_params:
      model: auto_router/adaptive_router
      adaptive_router_config:
        available_models: ["claude-sonnet-4-6", "claude-opus-4-7", "gpt-5.5"]
        weights:
          quality: 0.85
          cost: 0.15

  - model_name: cheap
    litellm_params:
      model: auto_router/adaptive_router
      adaptive_router_config:
        available_models: ["deepseek-v4-flash", "kimi-latest"]
        weights:
          quality: 0.1
          cost: 0.9

  - model_name: fast
    litellm_params:
      model: auto_router/adaptive_router
      adaptive_router_config:
        available_models: ["deepseek-v4-flash", "kimi-latest"]
        weights:
          quality: 0.2
          cost: 0.8

  - model_name: deepseek
    litellm_params:
      model: openrouter/deepseek/deepseek-v4-flash
      api_key: {{ .LITELLM_OPENROUTER_API_KEY }}
      reasoning:
        enabled: false

router_settings:
  routing_strategy: simple-shuffle
  num_retries: 3
  fallbacks:
    - tier3: ["tier2"]
    - tier2: ["tier1"]
    - tier1: ["claude-haiku-4-5"]
    - default: ["claude-haiku-4-5"]

general_settings:
  master_key: {{ .LITELLM_MASTER_KEY }}
  database_url: "postgresql://{{ .LITELLM_POSTGRES_USER }}:{{ .LITELLM_POSTGRES_PASSWORD }}@postgres17-rw.database.svc.cluster.local/litellm"

litellm_settings:
  success_callback: ["prometheus"]
  failure_callback: ["prometheus"]
  num_retries: 3
  request_timeout: 180
  allowed_fails: 3
  cooldown_time: 30
  drop_params: true
  modify_params: true
  telemetry: false
  retry: true
  add_function_to_prompt: true
  set_verbose: false
  cache: true
  cache_params:
    type: redis
    namespace: "litellm_caching"
    host: dragonfly.database.svc.cluster.local.
    port: 6379
