# -*= Adaptive router aliases =*-
# adaptive_router_config must be inside litellm_params (not auto_router_config — that's a file path)

  - model_name: default
    litellm_params:
      model: auto_router/adaptive_router
      adaptive_router_config:
        available_models: ["deepseek-v4-flash", "minimax-free", "gemini-flash", "claude-haiku-4-5", "claude-sonnet-4-6"]
        weights:
          quality: 0.25
          cost: 0.75

  - model_name: tier1
    litellm_params:
      model: auto_router/adaptive_router
      adaptive_router_config:
        available_models: ["deepseek-v4-flash", "minimax-free", "gemini-flash", "kimi-latest"]
        weights:
          quality: 0.2
          cost: 0.8

  - model_name: tier2
