---
apiVersion: v1
kind: ConfigMap
metadata:
  name: llm-router-config
  namespace: ai
data:
  routing.yaml: |
    upstream_url: "http://litellm.ai.svc.cluster.local:4000"
    default_tier: "tier2"

    stage_routing:
      execute: tier1
      milestone: tier1
      plan: tier2
      verify: tier2

    task_type_routing:
      quick: tier1
      generate: tier1
      refactor: tier2
      debug: tier2
      architecture: tier3

    model_alias_routing:
      gsd-execute: tier1
      gsd-milestone: tier1
      gsd-plan: tier2
      gsd-verify: tier2
      tier1: tier1
      cheap: tier1
      fast: tier1
      tier2: tier2
      sonnet: tier2
      default: tier2
      tier3: tier3
      opus: tier3
      heavy: tier3
