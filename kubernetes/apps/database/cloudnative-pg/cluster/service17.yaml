---
apiVersion: v1
kind: Service
metadata:
  name: postgres-lb17
  namespace: database
  annotations:
    lbipam.cilium.io/ips: ${SVC_POSTGRES_ADDR}
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  ports:
    - name: postgres
      port: 5432
      protocol: TCP
      targetPort: 5432
  selector:
    cnpg.io/cluster: postgres17
    role: primary
