---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: robusta
spec:
  interval: 30m
  chart:
    spec:
      chart: robusta
      version: 0.39.0
      sourceRef:
        kind: HelmRepository
        name: robusta
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    clusterName: bakerhaus
    isSmallCluster: true

    enablePrometheusStack: false
    disableCloudRouting: true

    enableHolmesGPT: true

    globalConfig:
      account_id: ""
      signing_key: ""
      prometheus_url: "http://kube-prometheus-stack-prometheus.observability.svc.cluster.local:9090"
      alertmanager_url: "http://kube-prometheus-stack-alertmanager.observability.svc.cluster.local:9093"
      grafana_url: "http://grafana.observability.svc.cluster.local:3000"

    sinksConfig:
      - slack_sink:
          name: main_slack_sink
          api_key: "{{ env.SLACK_API_KEY }}"
          slack_channel: "#k8s-alerts"
          investigate_link: true

    runner:
      resources:
        requests:
          cpu: 250m
          memory: 1024Mi
        limits:
          memory: 1024Mi
      additional_env_vars:
        - name: SLACK_API_KEY
          valueFrom:
            secretKeyRef:
              name: robusta-secret
              key: SLACK_API_KEY

    kubewatch:
      resources:
        requests:
          cpu: 10m
          memory: 512Mi
        limits:
          memory: 512Mi

    holmes:
      additionalEnvVars:
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: robusta-secret
              key: LITELLM_API_KEY
      modelList:
        litellm-default:
          api_base: "http://litellm.ai.svc.cluster.local:4000"
          model: openai/gpt-4o-mini
          temperature: 0
          max_tokens: 4096
      config:
        model: litellm-default
      toolsets:
        kubernetes/core:
          enabled: true
        kubernetes/logs:
          enabled: true
        robusta:
          enabled: true
        internet:
          enabled: false
        prometheus/metrics:
          enabled: true
        bash:
          enabled: true
          config:
            builtin_allowlist: extended
      crdPermissions:
        flux: true
        keda: false
        gatewayApi: true
        externalSecrets: true
        argo: false
        kafka: false
        crossplane: false
        istio: false
        velero: false
      resources:
        requests:
          cpu: 100m
          memory: 1024Mi
        limits:
          memory: 2048Mi
